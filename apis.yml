name: Google Cloud Video Intelligence
description: >-
  Google Cloud Video Intelligence API makes videos searchable and discoverable
  by extracting metadata with an easy-to-use REST API. It enables annotation of
  videos stored in Google Cloud Storage with video-level, shot-level, and
  frame-level labels, object tracking, text detection, and explicit content
  detection.
